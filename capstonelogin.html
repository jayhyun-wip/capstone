<!DOCTYPE html>
<head>
    <title>BayanTap</title>
    <link rel="stylesheet" href="capstonelogin.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <!-- BayanTap Logo -->
        </div>
        <div class="app-name"> BayanTap </div>
        <div class="subtitle">
            Water Bill Management System <br>
            Marcos Village District
        </div>
    

        <div class="form-container">
            <h2 class="form-title"> Treasurer Login </h2>
            <p class="form-subtitle"> Enter your credentials to access the system </p>

            <form id="loginForm">
                <div class="username"> Username </div>
            
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="username" name="username" placeholder="Enter Username" required>
                </div>

                <div class="form-group">
                    <label for="password"> Password </label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="text" id="password" name="password" placeholder="Enter Password" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember"> Remember Me </label>
                    </div>
                    <a href="#" class="forgot-password"> Forgot Password? </a>
                </div>

                <button type="submit" class="sign-in-btn"> Sign In </button>
            </form>

            <div class="demo-note"> Demo: Enter any credentials to access the system </div>
        </div>

        <div class="footer"> © 2026 BayanTap. All rights reserved. </div>
    </div>
</body>
</html>
